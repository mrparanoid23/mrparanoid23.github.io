# The Site Configuration
# ============================================================
# Import the theme
theme: jekyll-theme-chirpy

# ============================================================
# Site Settings
# ============================================================
lang: en
timezone: Asia/Kolkata

title: Rishav G C
tagline: Data Analyst · Marketing Specialist · SEO Specialist · Founder @Compile & Commit

description: >-
  Personal website of Rishav G C — Data Analyst, SEO Specialist, Digital Marketing Specialist,
  and Founder of Compile & Commit. Sharing insights on data, marketing, and growth.

url: "https://mrparanoid23.github.io"

github:
  username: mrparanoid23

twitter:
  username: ""

social:
  name: Rishav G C
  email: rishavgc07@gmail.com
  links:
    - https://www.linkedin.com/in/rishavgc/
    - https://github.com/mrparanoid23

# ============================================================
# Site Appearance
# ============================================================
theme_mode: dark   # Options: light | dark

avatar: assets/img/avatar.jpg

toc: true

# ============================================================
# Analytics
# ============================================================
analytics:
  google:
    id: ""  # Add your Google Analytics G-XXXXXXX ID here later

# ============================================================
# Page Views
# ============================================================
pageviews:
  provider: ""

# ============================================================
# Comments
# ============================================================
comments:
  provider: ""

# ============================================================
# SEO & Assets
# ============================================================
img_cdn: ""
cdn: ""

# ============================================================
# Sidebar Extra Links
# ============================================================
links:
  - title: LinkedIn
    url: https://www.linkedin.com/in/rishavgc/
  - title: GitHub
    url: https://github.com/mrparanoid23
  - title: Compile & Commit
    url: https://compileandcommit.com

# ============================================================
# Pagination
# ============================================================
paginate: 10

# ============================================================
# Collections
# ============================================================
collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: "_tabs"
      type: tabs
    values:
      layout: tab
      permalink: /:title/

# ============================================================
# Build Settings
# ============================================================
sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
