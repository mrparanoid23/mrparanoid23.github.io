# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

lang: en

timezone: Asia/Kolkata

title: Rishav G C

tagline: Data Analyst · SEO Specialist · Digital Marketing · Founder @Compilhe & Commit

description: >-
  Personal blog of Rishav G C — Data Analyst, SEO Specialist, Digital Marketing Specialist,
  and Founder of Compile & Commit. Writing about data, marketing, and growth.

url: "https://mrparanoid23.github.io"

github:
  username: mrparanoid23

social:
  name: Rishav G C
  email: rishavgc07@gmail.com
  links:
    - https://www.linkedin.com/in/rishavgc/
    - https://github.com/mrparanoid23

webmaster_verifications:
  google:
  bing:

analytics:
  google:
    id:
  goatcounter:
    id:

pageviews:
  provider:

theme_mode: dark

cdn:

avatar:

social_preview_image:

toc: true

comments:
  provider:
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

baseurl: ""

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
